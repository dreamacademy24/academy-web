<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Manager 3</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f8fc;
  --surface:#ffffff;
  --surface2:#f0f2f8;
  --border:#e4e7f0;
  --border2:#d0d5e8;
  --text:#1a1d2e;
  --text2:#4a5068;
  --text3:#8b91aa;
  --primary:#4361ee;
  --primary-l:#eef1fd;
  --primary-b:#c5cef9;
  --green:#06b47c;
  --green-l:#e6faf4;
  --amber:#f59f00;
  --amber-l:#fff8e6;
  --red:#e03131;
  --red-l:#fff0f0;
  --purple:#7048e8;
  --r:12px;--rs:8px;--rxs:5px;
  --shadow-sm:0 1px 3px rgba(67,97,238,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 16px rgba(67,97,238,.1),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 12px 40px rgba(67,97,238,.14),0 4px 12px rgba(0,0,0,.08);
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

/* ══════════════════════════════════
   LOGIN
══════════════════════════════════ */
.login-screen{
  position:fixed;inset:0;
  background:#f0f4ff;
  display:flex;align-items:center;justify-content:center;z-index:999;
}
.login-card{
  background:#fff;border-radius:20px;padding:40px;
  width:420px;max-width:92vw;
  box-shadow:0 24px 80px rgba(0,0,0,.18);
}
.login-logo{
  display:flex;align-items:center;gap:12px;margin-bottom:8px;
}
.login-logo-icon{
  width:44px;height:44px;background:linear-gradient(135deg,#4361ee,#7048e8);
  border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;
}
.login-brand{font-size:20px;font-weight:800;color:var(--text);}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:28px;}
.login-list{display:flex;flex-direction:column;gap:8px;}
.login-btn{
  display:flex;align-items:center;gap:12px;
  padding:13px 16px;border-radius:var(--r);
  border:1.5px solid var(--border);
  background:#fff;cursor:pointer;
  font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;
  color:var(--text2);transition:all .15s;text-align:left;width:100%;
}
.login-btn:hover{border-color:var(--primary);background:var(--primary-l);color:var(--primary);}
.login-btn.is-admin{border-color:#e9d5ff;background:#faf5ff;color:#6d28d9;}
.login-btn.is-admin:hover{border-color:#7048e8;background:#ede9fe;color:#6d28d9;}
.login-av{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0;
}
.login-step2{display:none;}
.login-sel-user{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--primary-l);border-radius:var(--rs);margin-bottom:16px;
}
.pw-field{position:relative;margin-bottom:10px;}
.pw-field input{
  width:100%;padding:11px 44px 11px 14px;
  border:1.5px solid var(--border2);border-radius:var(--rs);
  font-size:14px;font-family:'Pretendard',sans-serif;outline:none;color:var(--text);
  transition:border-color .15s;
}
.pw-field input:focus{border-color:var(--primary);}
.pw-eye{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;
}
.login-err{color:var(--red);font-size:12.5px;margin-bottom:10px;display:none;}

/* ══════════════════════════════════
   APP LAYOUT
══════════════════════════════════ */
.app-layout{display:flex;min-height:100vh;}

/* SIDEBAR */
.sidebar{
  width:240px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;inset:0 auto 0 0;z-index:50;
  overflow-y:auto;
}
.sb-header{
  padding:20px 18px 16px;
  border-bottom:1px solid var(--border);
}
.sb-brand{display:flex;align-items:center;gap:10px;}
.sb-brand-icon{
  width:36px;height:36px;background:linear-gradient(135deg,#4361ee,#7048e8);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;
}
.sb-brand-name{font-size:15px;font-weight:800;color:var(--text);}
.sb-brand-ver{font-size:10px;color:var(--text3);font-weight:500;margin-top:1px;}
.sb-section{
  padding:20px 14px 4px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);
}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;margin:1px 6px;border-radius:var(--rs);
  cursor:pointer;font-size:13.5px;font-weight:500;color:var(--text2);
  transition:all .12s;border:none;background:none;width:calc(100% - 12px);text-align:left;
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--primary-l);color:var(--primary);font-weight:600;}
.nav-item .ni-icon{width:20px;text-align:center;font-size:14px;flex-shrink:0;}
.nav-item .ni-badge{
  margin-left:auto;background:var(--primary);color:#fff;
  font-size:10px;font-weight:700;padding:1px 7px;border-radius:99px;
}
.emp-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;margin:1px 6px;border-radius:var(--rs);
  cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);
  transition:all .12s;
}
.emp-nav-item:hover{background:var(--surface2);}
.emp-nav-item.active{background:var(--primary-l);color:var(--primary);}
.emp-av{
  width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;color:#fff;flex-shrink:0;
}
.sb-divider{height:1px;background:var(--border);margin:8px 14px;}
.sb-footer{
  margin-top:auto;border-top:1px solid var(--border);padding:14px;
}
.sb-user{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--rs);cursor:pointer;
  transition:background .12s;
}
.sb-user:hover{background:var(--surface2);}
.sb-user-av{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;
}
.sb-user-name{font-size:13px;font-weight:700;}
.sb-user-role{font-size:11px;color:var(--text3);}

/* MAIN */
.main-area{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
.topbar-left .page-title{font-size:18px;font-weight:800;color:var(--text);}
.topbar-left .page-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.content{padding:24px 28px;flex:1;}

/* ══════════════════════════════════
   BUTTONS
══════════════════════════════════ */
.btn{
  font-family:'Pretendard',sans-serif;font-size:13px;font-weight:600;
  padding:8px 16px;border-radius:var(--rs);border:none;cursor:pointer;
  transition:all .13s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:#3251d3;}
.btn-secondary{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2);}
.btn-secondary:hover{background:var(--surface2);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#059669;}
.btn-danger{background:#fff;color:var(--red);border:1.5px solid #fca5a5;}
.btn-danger:hover{background:var(--red-l);}
.btn-ghost{background:none;border:1.5px dashed var(--border2);color:var(--text3);}
.btn-ghost:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 9px;font-size:11px;}
.btn-icon{padding:7px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--text3);font-size:16px;line-height:1;transition:all .13s;}
.btn-icon:hover{background:var(--primary-l);color:var(--primary);border-color:var(--primary-b);}

/* ══════════════════════════════════
   CARDS & SECTIONS
══════════════════════════════════ */
.card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  box-shadow:var(--shadow-sm);
  margin-bottom:16px;
}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.card-notice .card-header{background:linear-gradient(135deg,var(--primary-l),#f0f4ff);}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px;}
.badge-blue{background:var(--primary-l);color:var(--primary);}
.badge-green{background:var(--green-l);color:var(--green);}
.badge-amber{background:var(--amber-l);color:#b45309;}
.badge-red{background:var(--red-l);color:var(--red);}
.badge-gray{background:var(--surface2);color:var(--text3);}
.badge-purple{background:#f3f0ff;color:var(--purple);}

/* STATUS TAGS */
.tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11.5px;font-weight:500;padding:3px 8px;border-radius:99px;
  background:var(--surface2);color:var(--text3);
}
.tag-over{background:var(--red-l);color:var(--red);}
.tag-soon{background:var(--amber-l);color:#b45309;}
.tag-ok{background:var(--green-l);color:var(--green);}

/* ══════════════════════════════════
   NOTICES
══════════════════════════════════ */
.notice-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 20px;border-bottom:1px solid var(--border);
  transition:background .1s;
}
.notice-item:last-child{border-bottom:none;}
.notice-item:hover{background:#fafbff;}
.notice-item.done .notice-text{text-decoration:line-through;color:var(--text3);}
.notice-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:6px;}
.notice-item.done .notice-dot{background:var(--text3);}
.notice-text{flex:1;font-size:13.5px;line-height:1.6;color:var(--text2);}
.notice-date{font-size:11px;color:var(--text3);margin-top:3px;}
.notice-actions{display:flex;gap:2px;opacity:0;transition:opacity .13s;}
.notice-item:hover .notice-actions{opacity:1;}
.notice-btn{background:none;border:none;cursor:pointer;padding:3px 7px;border-radius:5px;font-size:12px;color:var(--text3);transition:all .12s;}
.notice-btn:hover{background:var(--surface2);color:var(--text2);}

/* ══════════════════════════════════
   HOME SUMMARY
══════════════════════════════════ */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:16px;}
.summary-card{
  border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;background:var(--surface);
}
.summary-head{
  display:flex;align-items:center;gap:8px;padding:11px 14px;
  font-size:13px;font-weight:700;border-bottom:1px solid var(--border);
}
.summary-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 14px;font-size:13px;cursor:pointer;transition:background .1s;
}
.summary-row:hover{background:var(--surface2);}
.summary-row.done .summary-title{text-decoration:line-through;color:var(--text3);}
.summary-title{flex:1;font-weight:500;color:var(--text2);}
.round-check{
  width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:#fff;
}
.round-check:hover{border-color:var(--primary);}
.summary-row.done .round-check{background:var(--text3);border-color:var(--text3);}
.round-check-mark{display:none;width:5px;height:5px;background:#fff;border-radius:50%;}
.summary-row.done .round-check-mark{display:block;}

/* ══════════════════════════════════
   BOARD
══════════════════════════════════ */
.board-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;margin-bottom:20px;
}
.tab-group{
  display:flex;background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--rs);padding:3px;gap:2px;
}
.tab-btn{
  padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;
  color:var(--text3);transition:all .13s;border:none;background:none;font-family:'Pretendard',sans-serif;
}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{background:var(--primary);color:#fff;font-weight:600;}
.view-toggle{display:flex;background:var(--surface2);border-radius:var(--rs);padding:3px;}
.view-btn{
  padding:5px 13px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;
  color:var(--text3);transition:all .13s;border:none;background:none;font-family:'Pretendard',sans-serif;
}
.view-btn.active{background:var(--primary);color:#fff;}

/* KANBAN */
.kanban-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.kanban-head{
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.kanban-head-left{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;}
.emp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.kanban-body{padding:10px;display:flex;flex-direction:column;gap:6px;min-height:60px;}

/* TASK CARD (kanban) */
.task-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--rs);padding:12px 13px;cursor:pointer;
  transition:all .15s;
}
.task-card:hover{border-color:var(--primary-b);box-shadow:var(--shadow);}
.task-card.done{opacity:.45;}
.task-card.done .tc-title{text-decoration:line-through;}
.tc-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.tc-check{
  width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);
  flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;background:#fff;
}
.tc-check:hover{border-color:var(--primary);}
.task-card.done .tc-check{background:var(--text3);border-color:var(--text3);}
.tc-check-mark{display:none;color:#fff;font-size:10px;}
.task-card.done .tc-check-mark{display:block;}
.tc-title{flex:1;font-size:13px;font-weight:600;line-height:1.45;color:var(--text);}
.tc-edit{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .13s;padding:0 2px;}
.task-card:hover .tc-edit{opacity:1;}
.tc-tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.tc-prog{margin-top:8px;}
.tc-prog-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:3px;}
.tc-prog-fill{height:100%;border-radius:99px;transition:width .3s;}
.tc-footer{display:flex;align-items:center;justify-content:flex-end;margin-top:8px;}
.cmt-btn{
  background:none;border:none;cursor:pointer;font-size:11.5px;font-weight:600;
  color:var(--text3);padding:2px 7px;border-radius:99px;transition:all .13s;
  display:flex;align-items:center;gap:3px;
}
.cmt-btn:hover{background:var(--primary-l);color:var(--primary);}
.cmt-btn.has-cmt{color:var(--primary);}

/* TASK LIST (업무별 보기) */
.task-list-wrap{display:flex;flex-direction:column;gap:4px;}
.task-list-header{
  display:grid;gap:12px;padding:9px 16px;
  font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);
  grid-template-columns:28px 1fr 140px 110px 120px 80px 52px;
}
.task-list-row{
  display:grid;gap:12px;align-items:center;padding:11px 16px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);
  cursor:pointer;transition:all .13s;
}
.task-list-row:hover{border-color:var(--primary-b);box-shadow:var(--shadow-sm);}
.task-list-row.done{opacity:.45;}
.task-list-row.done .tl-title{text-decoration:line-through;}

/* BATCH DELETE TOOLBAR */
.batch-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;flex-wrap:wrap;}
.batch-bar .btn{font-size:12px;padding:6px 14px;}
.batch-bar .batch-info{font-size:12px;color:var(--text3);font-weight:600;margin-left:auto;}
.batch-cb{width:16px;height:16px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.task-card.batch-selected,.task-list-row.batch-selected,.emp-task.batch-selected{border-color:var(--primary);background:var(--primary-l);opacity:1;}

/* ══════════════════════════════════
   CALENDAR
══════════════════════════════════ */
.cal-toolbar{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;
}
.cal-nav{display:flex;align-items:center;gap:10px;}
.cal-title{font-size:17px;font-weight:800;}
.cal-nav-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);
  padding:6px 13px;cursor:pointer;font-size:14px;color:var(--text2);
  transition:all .13s;font-family:'Pretendard',sans-serif;
}
.cal-nav-btn:hover{background:var(--primary-l);color:var(--primary);border-color:var(--primary-b);}
.cal-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-day-label{
  text-align:center;padding:10px 4px;font-size:11px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);
}
.cal-cell{
  min-height:110px;padding:8px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);
}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month{background:#fafbfc;}
.cal-cell.today .cal-date{
  background:var(--primary);color:#fff;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
}
.cal-date{font-size:12px;font-weight:600;color:var(--text3);margin-bottom:4px;}
.cal-cell.other-month .cal-date{color:#d1d5db;}
.cal-chip{
  font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;
  margin-bottom:2px;cursor:pointer;display:block;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .13s;
}
.cal-chip:hover{opacity:.75;}
.cal-chip.done{opacity:.35;text-decoration:line-through;}
.cal-more{font-size:10px;color:var(--text3);padding:1px 5px;}

/* WEEK VIEW */
.week-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.week-header-grid{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.week-day-head{padding:10px 8px;border-right:1px solid var(--border);text-align:center;}
.week-day-head:last-child{border-right:none;}
.week-day-name{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;}
.week-day-num{font-size:18px;font-weight:800;color:var(--text2);margin-top:2px;}
.week-day-head.is-today .week-day-num{
  background:var(--primary);color:#fff;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:2px auto 0;
}
.week-body-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.week-cell{border-right:1px solid var(--border);padding:8px;min-height:180px;}
.week-cell:last-child{border-right:none;}
.week-chip{
  font-size:11px;font-weight:600;padding:5px 8px;border-radius:6px;
  margin-bottom:4px;cursor:pointer;transition:all .13s;display:block;
  border-left:3px solid;line-height:1.4;
}
.week-chip:hover{opacity:.8;}
.week-chip.done{opacity:.35;text-decoration:line-through;}
.week-sidebar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-top:14px;}
.week-sidebar-title{font-size:13px;font-weight:700;margin-bottom:14px;}
.week-emp-block{margin-bottom:12px;}
.week-emp-name{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.week-task-item{
  font-size:12px;color:var(--text2);padding:3px 0 3px 12px;
  border-left:2px solid;line-height:1.5;margin-bottom:2px;
}

/* ══════════════════════════════════
   EMPLOYEE PAGE
══════════════════════════════════ */
.emp-hero{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 20px;margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.emp-hero-left{display:flex;align-items:center;gap:12px;}
.emp-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:#fff;flex-shrink:0;}
.emp-name{font-size:16px;font-weight:800;}
.emp-meta{font-size:12px;color:var(--text3);margin-top:2px;}
/* compact inline stats */
.emp-stats-inline{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.stat-chip{
  display:flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--surface2);white-space:nowrap;
}
.stat-chip-num{font-size:15px;font-weight:800;line-height:1;}
.stat-chip-label{font-size:11px;color:var(--text3);font-weight:500;}
.stats-row{display:none!important;}
.stat-card{display:none!important;}

/* QUICK ADD */
.quick-add{
  background:var(--surface);border:2px dashed var(--border2);border-radius:var(--r);
  padding:18px 20px;margin-bottom:18px;transition:all .15s;
}
.quick-add:focus-within{border-color:var(--primary);border-style:solid;}
.qa-title{font-size:13px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.qa-input{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-family:'Pretendard',sans-serif;font-size:14px;padding:10px 13px;
  outline:none;transition:all .13s;
}
.qa-input:focus{border-color:var(--primary);background:#fff;}
.qa-input::placeholder{color:var(--text3);}
.qa-row{display:flex;gap:8px;margin-bottom:8px;}
.qa-dropzone{
  border:1.5px dashed var(--border2);border-radius:var(--rs);padding:10px;
  text-align:center;cursor:pointer;transition:all .13s;color:var(--text3);font-size:12.5px;
  margin-bottom:8px;
}
.qa-dropzone:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l);}
.share-row{
  display:flex;align-items:center;gap:10px;padding:10px 13px;
  background:var(--green-l);border-radius:var(--rs);border:1px solid #a7f3d0;
  cursor:pointer;margin-bottom:8px;font-size:13px;font-weight:600;color:#065f46;
}

/* EMP TASK CARDS (accordion) */
.emp-task{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);
  margin-bottom:6px;overflow:hidden;transition:all .2s;
}
.emp-task.is-shared{border-left:3px solid var(--green);}
.emp-task.is-private{border-left:3px solid var(--amber);}
.emp-task.done{opacity:.5;}
.emp-task-head{
  padding:12px 18px;display:grid;
  grid-template-columns:26px 1fr auto auto;
  align-items:center;gap:12px;cursor:pointer;
  transition:background .1s;
}
.emp-task-head:hover{background:#fafbff;}
.emp-task.done .emp-task-title{text-decoration:line-through;}
.et-check{
  width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:#fff;transition:all .15s;
}
.et-check:hover{border-color:var(--primary);}
.emp-task.done .et-check{background:var(--text3);border-color:var(--text3);}
.et-checkmark{display:none;color:#fff;font-size:9px;}
.emp-task.done .et-checkmark{display:block;}
.emp-task-title{font-size:13.5px;font-weight:600;line-height:1.4;min-width:0;}
.et-badges{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.et-arrow{font-size:11px;color:var(--text3);transition:transform .2s;flex-shrink:0;}
.emp-task.open .et-arrow{transform:rotate(180deg);}
.emp-task.open .emp-task-head{border-bottom:1px solid var(--border);}
.emp-task-body{display:none;padding:16px 20px;}
.emp-task.open .emp-task-body{display:block;}

/* CHECKLIST */
.cl-wrap{margin-bottom:14px;}
.cl-header{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;}
.cl-bar{height:4px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.cl-bar-fill{height:100%;border-radius:99px;transition:width .3s;}
.cl-item{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--surface2);}
.cl-item:last-child{border-bottom:none;}
.cl-cb{
  width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .13s;background:#fff;
}
.cl-cb.checked{background:var(--green);border-color:var(--green);}
.cl-cb.checked::after{content:'✓';color:#fff;font-size:10px;}
.cl-text{flex:1;font-size:12.5px;color:var(--text2);cursor:text;min-width:0;}
.cl-text.done-text{text-decoration:line-through;color:var(--text3);}
.cl-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;opacity:0;transition:opacity .12s;}
.cl-item:hover .cl-del{opacity:1;}
.cl-add-row{display:flex;gap:6px;margin-top:8px;}
.cl-add-inp{
  flex:1;background:var(--surface2);border:1.5px dashed var(--border2);border-radius:var(--rxs);
  padding:6px 10px;font-size:12.5px;outline:none;font-family:'Pretendard',sans-serif;color:var(--text);
}
.cl-add-inp:focus{border-color:var(--primary);border-style:solid;background:#fff;}
.cl-add-btn{
  background:var(--primary);border:none;border-radius:var(--rxs);color:#fff;
  cursor:pointer;padding:6px 12px;font-size:12px;font-family:'Pretendard',sans-serif;font-weight:700;
}

/* PROGRESS SLIDER */
.prog-wrap{margin:12px 0;}
.prog-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-pct{font-size:20px;font-weight:800;transition:color .2s;}
.prog-slider{
  width:100%;height:6px;-webkit-appearance:none;appearance:none;
  border-radius:99px;outline:none;cursor:pointer;
}
.prog-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer;transition:transform .15s;
}
.prog-slider::-webkit-slider-thumb:hover{transform:scale(1.2);}
.prog-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:6px;}
.prog-bar-fill{height:100%;border-radius:99px;transition:width .3s ease;}
.prog-hint{font-size:11px;color:var(--text3);text-align:right;margin-top:4px;}

/* INLINE COMMENT */
.cmt-preview{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.cmt-preview-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.cmt-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.cmt-av-sm{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;}
.cmt-bubble-sm{background:var(--surface2);border-radius:4px 10px 10px 10px;padding:7px 10px;font-size:12.5px;line-height:1.5;flex:1;}
.cmt-name-sm{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:2px;}
.cmt-date-sm{font-size:10px;color:var(--text3);margin-top:2px;}
.cmt-input-row{display:flex;gap:7px;margin-top:8px;}
.cmt-inp-sm{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-family:'Pretendard',sans-serif;font-size:12.5px;padding:7px 10px;
  outline:none;resize:none;transition:border-color .13s;
}
.cmt-inp-sm:focus{border-color:var(--primary);background:#fff;}
.cmt-send-sm{
  background:var(--primary);border:none;border-radius:var(--rs);color:#fff;
  cursor:pointer;padding:7px 13px;font-size:12px;font-family:'Pretendard',sans-serif;font-weight:700;
}

/* ══════════════════════════════════
   PROJECTS
══════════════════════════════════ */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:20px;}
.proj-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:all .15s;
}
.proj-card:hover{box-shadow:var(--shadow);transform:translateY(-1px);}
.proj-accent{height:5px;}
.proj-body{padding:16px 18px 14px;}
.proj-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.proj-desc{font-size:12.5px;color:var(--text3);line-height:1.55;margin-bottom:12px;}
.proj-prog-label{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px;}
.proj-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-bottom:12px;}
.proj-bar-fill{height:100%;border-radius:99px;transition:width .4s;}
.proj-members{display:flex;align-items:center;gap:8px;}
.proj-av-stack{display:flex;}
.proj-av{
  width:24px;height:24px;border-radius:7px;border:2px solid #fff;
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;
  margin-left:-6px;flex-shrink:0;
}
.proj-av:first-child{margin-left:0;}
.proj-footer{
  padding:10px 18px;display:flex;align-items:center;justify-content:space-between;
  font-size:11.5px;color:var(--text3);border-top:1px solid var(--border);
}

/* PROJECT DETAIL */
.proj-detail-hero{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:22px 24px;margin-bottom:18px;
}
.pdh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.pdh-color-block{width:14px;height:14px;border-radius:4px;flex-shrink:0;margin-top:3px;}
.pdh-name{font-size:21px;font-weight:800;flex:1;}
.pdh-desc{font-size:13px;color:var(--text2);line-height:1.65;margin-bottom:14px;}
.pdh-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;}
.m-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700;}

.proj-detail-layout{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start;}
@media(max-width:900px){.proj-detail-layout{grid-template-columns:1fr;}}

/* THREAD */
.thread-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.thread-head{padding:14px 18px;border-bottom:1px solid var(--border);font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.thread-body{padding:16px 18px;display:flex;flex-direction:column;gap:14px;max-height:440px;overflow-y:auto;}
.msg-row{display:flex;gap:10px;align-items:flex-start;}
.msg-row.is-me{flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;}
.msg-content{max-width:78%;}
.msg-name{font-size:10.5px;font-weight:700;color:var(--text2);margin-bottom:3px;}
.msg-row.is-me .msg-name{display:none;}
.msg-bubble{padding:10px 13px;border-radius:4px 12px 12px 12px;font-size:13px;line-height:1.55;position:relative;}
.msg-row:not(.is-me) .msg-bubble{background:var(--surface2);}
.msg-row.is-me .msg-bubble{background:var(--primary);color:#fff;border-radius:12px 4px 12px 12px;}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px;}
.msg-row.is-me .msg-time{text-align:right;}
.msg-del{background:none;border:none;cursor:pointer;font-size:10px;color:rgba(255,255,255,.4);margin-left:5px;}
.msg-del:hover{color:#fff;}
.thread-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;}
.thread-ta{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-family:'Pretendard',sans-serif;font-size:13px;padding:8px 12px;
  outline:none;resize:none;min-height:38px;max-height:90px;transition:border-color .13s;
}
.thread-ta:focus{border-color:var(--primary);background:#fff;}
.thread-send{
  background:var(--primary);border:none;border-radius:var(--rs);color:#fff;
  cursor:pointer;padding:9px 16px;font-size:13px;font-family:'Pretendard',sans-serif;font-weight:700;
  align-self:flex-end;
}
.thread-send:hover{background:#3251d3;}

/* PROJ TASKS SIDE */
.proj-tasks{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.pt-head{padding:13px 16px;border-bottom:1px solid var(--border);font-size:13.5px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.pt-list{padding:10px;display:flex;flex-direction:column;gap:5px;}
.pt-item{
  display:flex;align-items:flex-start;gap:8px;padding:10px 11px;
  background:var(--surface2);border-radius:var(--rs);font-size:12.5px;
  transition:background .1s;cursor:pointer;
}
.pt-item:hover{background:#edf0f8;}
.pt-item.done .pt-title{text-decoration:line-through;color:var(--text3);}
.pt-title{flex:1;line-height:1.4;font-weight:500;}

/* ══════════════════════════════════
   DAILY CHECKLIST
══════════════════════════════════ */
.daily-header{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;
}
.daily-date{font-size:16px;font-weight:800;}
.daily-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.daily-stats{display:flex;gap:18px;}
.daily-stat-n{font-size:22px;font-weight:800;}
.daily-stat-l{font-size:11px;color:var(--text3);margin-top:2px;}
/* 메모장 스타일 */
.daily-memo{
  background:#fffef0;border:1px solid #f0e68c;border-radius:var(--r);
  padding:0;margin-bottom:14px;overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
}
.daily-memo-header{
  background:linear-gradient(135deg,#fef9c3,#fef3c7);
  padding:12px 18px;border-bottom:1px solid #f0e68c;
  display:flex;align-items:center;justify-content:space-between;
  font-size:13.5px;font-weight:700;color:#92400e;
}
.daily-prog{height:4px;background:#f5f0a0;overflow:hidden;}
.daily-prog-fill{height:100%;background:#f59e0b;transition:width .4s;}
.daily-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 18px;border-bottom:1px solid #f7f0c0;
  transition:background .1s;
}
.daily-item:last-child{border-bottom:none;}
.daily-item:hover{background:#fffde7;}
.daily-item.done .daily-item-text{text-decoration:line-through;color:#a0916c;}
.daily-cb{
  width:20px;height:20px;border-radius:50%;border:1.5px solid #d0b860;
  flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;
  background:#fff;transition:all .15s;
}
.daily-cb:hover{border-color:var(--amber);}
.daily-item.done .daily-cb{background:var(--amber);border-color:var(--amber);}
.daily-cb-mark{display:none;color:#fff;font-size:10px;}
.daily-item.done .daily-cb-mark{display:block;}
.daily-item-text{flex:1;font-size:13.5px;color:#5c4a14;}
.daily-fixed-pin{font-size:12px;margin-left:4px;}
.daily-del{background:none;border:none;cursor:pointer;color:#c0a040;font-size:13px;opacity:0;transition:opacity .12s;}
.daily-item:hover .daily-del{opacity:1;}
.daily-add-row{display:flex;gap:8px;padding:11px 18px;background:#fffde7;border-top:1px dashed #f0e68c;}
.daily-add-inp{
  flex:1;background:transparent;border:none;border-bottom:1px solid #d0b860;
  font-size:13.5px;font-family:'Pretendard',sans-serif;color:#5c4a14;padding:3px 0;outline:none;
}
.daily-add-inp::placeholder{color:#c0a860;}
/* 마감 업무 */
.due-today-section{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;margin-bottom:14px;
}
.due-today-head{
  padding:12px 18px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--red-l),#fff8f8);
  color:var(--red);
}
/* 고정 항목 */
.fixed-section{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;
}
.fixed-head{
  padding:12px 18px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;
}
.fixed-item{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border);}
.fixed-item:last-child{border-bottom:none;}
.fixed-add-row{display:flex;gap:8px;padding:10px 18px;border-top:1px solid var(--border);}
.fixed-add-inp{
  flex:1;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  padding:7px 11px;font-size:13px;font-family:'Pretendard',sans-serif;color:var(--text);outline:none;
}
.fixed-add-inp:focus{border-color:var(--primary);}

/* ══════════════════════════════════
   TASK DETAIL MODAL
══════════════════════════════════ */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(26,29,46,.35);backdrop-filter:blur(4px);
  z-index:200;align-items:center;justify-content:center;
}
.overlay.open{display:flex;}
.modal-box{
  background:#fff;border-radius:16px;padding:28px;
  width:540px;max-width:92vw;max-height:88vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:modalIn .18s ease;
}
@keyframes modalIn{from{transform:scale(.96) translateY(8px);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal-title{font-size:16px;font-weight:800;margin-bottom:18px;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-family:'Pretendard',sans-serif;font-size:13.5px;padding:9px 12px;outline:none;
  transition:border-color .13s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--primary);background:#fff;}
.form-textarea{resize:vertical;min-height:65px;}
.modal-footer{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.modal-footer-left{margin-right:auto;}

/* task detail modal info box */
.detail-info{
  background:var(--surface2);border-radius:var(--rs);padding:14px;margin-bottom:16px;
  border-left:4px solid var(--primary);
}
.detail-title{font-size:15px;font-weight:800;margin-bottom:6px;line-height:1.4;}
.detail-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;}
.detail-check-wrap{display:flex;align-items:flex-start;gap:10px;}
.detail-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;margin-top:1px;}
.detail-check:hover{border-color:var(--primary);}

/* Full chat modal */
.chat-modal{max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.chat-modal .modal-box{padding:0;overflow:hidden;}
.chat-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);}
.chat-msgs{flex:1;padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;min-height:280px;max-height:360px;}
.chat-input-area{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;}

/* COLOR / MEMBER PICKER */
.color-picker{display:flex;gap:8px;flex-wrap:wrap;}
.color-opt{width:28px;height:28px;border-radius:8px;cursor:pointer;border:3px solid transparent;transition:border-color .13s;flex-shrink:0;}
.color-opt.sel{border-color:#111!important;}
.member-picker{display:flex;gap:6px;flex-wrap:wrap;}
.member-chip{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:99px;
  cursor:pointer;font-size:12px;font-weight:700;border:1.5px solid var(--border2);
  background:transparent;color:var(--text3);transition:all .13s;
}

/* ADMIN PANEL */
.admin-panel{
  background:linear-gradient(135deg,#1e3a5f,#162d4a);
  border-radius:var(--r);padding:20px;color:#fff;margin-top:20px;
}
.admin-panel-title{font-size:13.5px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.admin-cmt-item{background:rgba(255,255,255,.08);border-radius:var(--rs);padding:10px 12px;font-size:12.5px;line-height:1.55;color:rgba(255,255,255,.9);position:relative;margin-bottom:8px;}
.admin-cmt-tag{font-size:10.5px;color:rgba(255,255,255,.5);margin-bottom:4px;}
.admin-cmt-date{font-size:10px;color:rgba(255,255,255,.4);margin-top:4px;font-family:'JetBrains Mono',monospace;}
.admin-cmt-del{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:12px;opacity:0;transition:opacity .13s;}
.admin-cmt-item:hover .admin-cmt-del{opacity:1;}
.admin-cmt-del:hover{color:#f87171;}
.admin-cmt-row{display:flex;gap:7px;}
.admin-cmt-inp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:var(--rs);color:#fff;font-family:'Pretendard',sans-serif;font-size:13px;padding:8px 11px;outline:none;}
.admin-cmt-inp::placeholder{color:rgba(255,255,255,.35);}
.admin-cmt-inp:focus{border-color:rgba(255,255,255,.5);}
.admin-cmt-send{background:rgba(255,255,255,.2);border:none;border-radius:var(--rs);color:#fff;cursor:pointer;padding:8px 14px;font-size:13px;font-family:'Pretendard',sans-serif;font-weight:700;transition:background .13s;white-space:nowrap;}
.admin-cmt-send:hover{background:rgba(255,255,255,.3);}

/* FILE LIST */
.file-zone{border:2px dashed var(--border2);border-radius:var(--rs);padding:14px;text-align:center;cursor:pointer;transition:all .13s;color:var(--text3);font-size:12.5px;}
.file-zone:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-l);}
.file-list{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.file-item{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--surface2);border-radius:var(--rxs);font-size:12px;}
.file-name{flex:1;font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.file-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;}
.file-del:hover{color:var(--red);}

/* PASSWORD MODAL */
.pw-admin-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:var(--rs);margin-bottom:7px;}
.pw-admin-inp{background:#fff;border:1.5px solid var(--border2);border-radius:var(--rs);padding:6px 10px;font-size:12.5px;outline:none;width:150px;font-family:'Pretendard',sans-serif;}

/* MISC */
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px;}
.empty-state .ei{font-size:32px;margin-bottom:10px;}
.hidden{display:none!important;}

/* INLINE DUE DATE EDIT */
.due-inline-inp{
  border:none;border-bottom:1.5px solid var(--primary);outline:none;
  font-size:12px;font-family:'Pretendard',sans-serif;padding:2px 5px;
  background:var(--primary-l);color:var(--primary);border-radius:3px 3px 0 0;
}

/* POMODORO */
.pomo-bar{position:fixed;top:0;left:0;right:0;z-index:999;background:linear-gradient(135deg,#e03131,#c92a2a);color:#fff;padding:10px 24px;display:flex;align-items:center;gap:14px;font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(224,49,49,.3);animation:modalIn .2s ease;}
.pomo-bar .pomo-time{font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;min-width:60px;}
.pomo-bar .pomo-task{flex:1;font-size:12px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pomo-bar .pomo-cancel{background:rgba(255,255,255,.2);border:none;color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Pretendard',sans-serif;}
.pomo-bar .pomo-cancel:hover{background:rgba(255,255,255,.3);}
.pomo-btn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text3);padding:2px 4px;transition:color .13s;}
.pomo-btn:hover{color:var(--red);}

/* WEEKLY REPORT */
.week-report{background:linear-gradient(135deg,var(--primary-l),#f0f4ff);border:1px solid var(--primary-b);border-radius:var(--r);padding:20px 24px;margin-bottom:16px;}
.wr-title{font-size:14px;font-weight:800;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.wr-stats{display:flex;gap:20px;margin-bottom:14px;}
.wr-stat{text-align:center;}
.wr-stat-n{font-size:24px;font-weight:800;line-height:1;}
.wr-stat-l{font-size:11px;color:var(--text3);margin-top:4px;}
.wr-bar{height:8px;background:var(--primary-b);border-radius:99px;overflow:hidden;margin-bottom:8px;}
.wr-bar-fill{height:100%;background:var(--primary);border-radius:99px;transition:width .4s;}
.wr-msg{font-size:12.5px;color:var(--text2);font-weight:600;}

/* GOALS CARD */
.goals-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;margin-bottom:16px;}
.goals-title{font-size:14px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.goal-item{margin-bottom:12px;}
.goal-text{font-size:13px;font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between;}
.goal-bar{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;}
.goal-bar-fill{height:100%;border-radius:99px;transition:width .3s;}

/* SETTINGS MODAL */
.settings-tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--rs);padding:3px;margin-bottom:18px;flex-wrap:wrap;}
.settings-tab{padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);border:none;background:none;font-family:'Pretendard',sans-serif;transition:all .13s;white-space:nowrap;}
.settings-tab:hover{color:var(--text2);}
.settings-tab.active{background:var(--primary);color:#fff;font-weight:600;}
.settings-panel{display:none;}
.settings-panel.active{display:block;}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.setting-row:last-child{border-bottom:none;}
.toggle-sw{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle-sw input{display:none;}
.toggle-track{position:absolute;inset:0;background:var(--border2);border-radius:99px;transition:background .2s;}
.toggle-sw input:checked+.toggle-track{background:var(--primary);}
.toggle-knob{position:absolute;top:2px;left:2px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.toggle-sw input:checked~.toggle-knob{transform:translateX(20px);}

/* NOTICE READ */
.notice-read{font-size:10px;color:var(--text3);margin-top:2px;}
.notice-read-btn{background:var(--primary);color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer;font-family:'Pretendard',sans-serif;font-weight:600;margin-left:6px;}
.notice-read-btn:hover{background:#3251d3;}
.unread-dot{width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;margin-left:4px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* TEMPLATE */
.tmpl-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:var(--rs);margin-bottom:6px;}
.tmpl-item span{flex:1;font-size:13px;font-weight:500;}
/* ── 프로젝트 보고 대시보드 ── */
.report-dashboard{margin-top:28px;padding-top:24px;border-top:2px solid var(--border,#e2e8f0);}
.report-dashboard-title{font-size:16px;font-weight:800;color:var(--text,#1a1a2e);margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.report-member-col{margin-bottom:24px;}
.report-member-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border,#e2e8f0);}
.report-member-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;}
.report-member-name{font-size:15px;font-weight:800;color:var(--text,#1a1a2e);}
.report-member-count{font-size:12px;color:#94a3b8;margin-left:auto;background:var(--surface,#f8fafc);padding:2px 10px;border-radius:20px;border:1px solid var(--border,#e2e8f0);}
.report-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:12px;}
.report-card{background:var(--surface,#f8fafc);border:1px solid var(--border,#e2e8f0);border-radius:12px;padding:16px;position:relative;transition:box-shadow .15s;}
.report-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.report-card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px;}
.report-card-title{font-size:14px;font-weight:700;color:var(--text,#1a1a2e);line-height:1.4;}
.report-card-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0;}
.badge-done{background:#dcfce7;color:#16a34a;}
.badge-progress{background:#dbeafe;color:#1d4ed8;}
.badge-issue{background:#fee2e2;color:#dc2626;}
.badge-plan{background:#f3f4f6;color:#6b7280;}
.report-card-body{font-size:13px;color:var(--text2,#374151);line-height:1.7;white-space:pre-wrap;margin-bottom:12px;}
.report-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#94a3b8;}
.report-card-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:14px;padding:2px 4px;line-height:1;}
.report-card-del:hover{color:#dc2626;}
.report-input-box{background:var(--bg,#fff);border:1.5px solid var(--border,#e2e8f0);border-radius:12px;padding:16px;margin-top:4px;}
.report-input-row{display:flex;gap:8px;margin-bottom:8px;}
.report-input-title{flex:1;padding:9px 12px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);color:var(--text);}
.report-input-title:focus{border-color:var(--primary);}
.report-input-status{padding:9px 12px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:var(--bg);cursor:pointer;color:var(--text);}
.report-input-status:focus{border-color:var(--primary);}
.report-input-body{width:100%;padding:10px 12px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;outline:none;box-sizing:border-box;background:var(--bg);color:var(--text);}
.report-input-body:focus{border-color:var(--primary);}
.report-input-actions{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}
.report-submit-btn{padding:8px 20px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.report-submit-btn:hover{opacity:.9;}
.report-hint{font-size:11px;color:#94a3b8;}
.report-empty{font-size:12px;color:#94a3b8;padding:12px;text-align:center;background:var(--surface,#f8fafc);border-radius:8px;border:1px dashed var(--border,#e2e8f0);}

/* ── 보고 카드 칸반 스타일 ── */
.report-kanban{display:flex;flex-direction:column;gap:12px;}
.rk-card{background:#fff;border:1px solid var(--border,#e2e8f0);border-radius:12px;padding:16px;transition:box-shadow 0.15s;}
.rk-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.08);}
.rk-card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.rk-card-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.rk-card-title{font-size:14px;font-weight:700;color:var(--text,#1a1a2e);flex:1;line-height:1.4;}
.rk-card-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0;}
.rk-card-body{font-size:13px;color:var(--text2,#374151);line-height:1.7;white-space:pre-wrap;padding:10px 12px;background:var(--surface,#f8fafc);border-radius:8px;margin-bottom:10px;}
.rk-card-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:#94a3b8;}
.rk-del-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#cbd5e1;padding:2px 4px;}
.rk-del-btn:hover{color:#dc2626;}
.rk-new-card{background:var(--bg,#fff);border:1.5px dashed var(--border,#e2e8f0);border-radius:12px;padding:16px;}
.rk-new-card-header{margin-bottom:12px;}
.rk-status-tabs{display:flex;gap:6px;flex-wrap:wrap;}
.rk-status-tab{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border,#e2e8f0);background:var(--surface,#f8fafc);color:#6b7280;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;}
.rk-status-tab:hover{border-color:#1a6fc4;color:#1a6fc4;}
.rk-title-input{width:100%;padding:10px 14px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:14px;font-weight:600;font-family:inherit;outline:none;margin-bottom:8px;box-sizing:border-box;color:var(--text,#1a1a2e);background:var(--bg,#fff);}
.rk-title-input:focus{border-color:var(--primary,#1a6fc4);box-shadow:0 0 0 3px rgba(26,111,196,0.08);}
.rk-body-input{width:100%;padding:10px 14px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;min-height:90px;outline:none;box-sizing:border-box;color:var(--text,#1a1a2e);line-height:1.6;background:var(--bg,#fff);}
.rk-body-input:focus{border-color:var(--primary,#1a6fc4);box-shadow:0 0 0 3px rgba(26,111,196,0.08);}
.rk-new-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.rk-hint{font-size:11px;color:#94a3b8;}
.rk-submit-btn{padding:9px 22px;background:var(--primary,#1a6fc4);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.rk-submit-btn:hover{opacity:.9;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏢</div>
      <div>
        <div class="login-brand">Team Manager</div>
      </div>
    </div>
    <div class="login-sub">직원을 선택하거나 관리자로 로그인하세요</div>
    <div id="loginStep1"><div class="login-list" id="loginOpts"></div></div>
    <div class="login-step2" id="loginStep2">
      <div class="login-sel-user" id="loginSelUser"></div>
      <div class="pw-field">
        <input type="password" id="loginPwInp" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')submitLogin()" />
        <button class="pw-eye" onclick="togglePwVis()" id="pwVisBtn">👁</button>
      </div>
      <div class="login-err" id="loginErr">❌ 비밀번호가 틀렸습니다</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="backToStep1()">← 뒤로</button>
        <button class="btn btn-primary" style="flex:2" onclick="submitLogin()">로그인 →</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app-layout hidden" id="app">
  <aside class="sidebar">
    <div class="sb-header">
      <div class="sb-brand">
        <div class="sb-brand-icon">🏢</div>
        <div>
          <div class="sb-brand-name">Team Manager</div>
          <div class="sb-brand-ver" id="sbRole">직원</div>
        </div>
      </div>
    </div>
    <div class="sb-section">메뉴</div>
    <button class="nav-item active" data-p="home" onclick="showPage('home')"><span class="ni-icon">🏠</span> 홈</button>
    <button class="nav-item" data-p="board" onclick="showPage('board')"><span class="ni-icon">📋</span> 전체 업무</button>
    <button class="nav-item" data-p="calendar" onclick="showPage('calendar')"><span class="ni-icon">📅</span> 달력</button>
    <button class="nav-item" data-p="projects" onclick="showPage('projects')"><span class="ni-icon">🚀</span> 프로젝트</button>
    <div class="sb-divider"></div>
    <div class="sb-section">직원 공간</div>
    <div id="empNav"></div>
    <div class="sb-divider"></div>
    <button class="nav-item" onclick="openSettings()"><span class="ni-icon">⚙️</span> 설정</button>
    <div class="sb-footer">
      <div class="sb-user" onclick="logout()">
        <div class="sb-user-av" id="sbAv"></div>
        <div><div class="sb-user-name" id="sbName"></div><div class="sb-user-role">로그아웃 →</div></div>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <div class="topbar">
      <div class="topbar-left">
        <div class="page-title" id="topT">홈</div>
        <div class="page-sub" id="topS"></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" id="btnNotice" onclick="openM('noticeModal')" style="display:none">📌 공지 추가</button>
        <button class="btn btn-secondary btn-sm" id="btnProj" onclick="openProjModal()" style="display:none">🚀 새 프로젝트</button>
        <button class="btn-icon" id="btnSettings" onclick="openSettings()" title="설정">⚙️</button>
        <button class="btn btn-primary btn-sm" id="btnTask" onclick="openTaskModal('')">+ 업무 추가</button>
      </div>
    </div>

    <div class="content">
      <!-- HOME -->
      <div id="page-home">
        <div id="weekReport"></div>
        <div id="goalsCard"></div>
        <div class="card card-notice">
          <div class="card-header">
            <div class="card-title">📌 공통 공지사항 <span id="nbadge" class="badge badge-blue"></span><span id="unreadDot"></span></div>
          </div>
          <div id="noticeList"></div>
        </div>
        <div class="card">
          <div class="card-header">
            <div class="card-title">📊 전체 업무 현황</div>
            <button class="btn btn-secondary btn-xs" onclick="showPage('board')">전체 보기 →</button>
          </div>
          <div class="summary-grid" id="homeSG"></div>
        </div>
      </div>

      <!-- BOARD -->
      <div id="page-board" class="hidden">
        <div class="board-toolbar">
          <div class="tab-group" id="boardTabs">
            <button class="tab-btn active" onclick="setBF('all',this)">전체</button>
            <button class="tab-btn" onclick="setBF('unassigned',this)">미배정</button>
            <button class="tab-btn" onclick="setBF('active',this)">진행 중</button>
            <button class="tab-btn" onclick="setBF('done',this)">완료</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:var(--text3);font-weight:500">보기</span>
            <div class="view-toggle">
              <button class="view-btn brd-vtb" id="bv-emp" onclick="setBoardView('emp',this)">👤 직원별</button>
              <button class="view-btn brd-vtb active" id="bv-task" onclick="setBoardView('task',this)">📋 업무별</button>
            </div>
          </div>
        </div>
        <div id="boardGrid"></div>
      </div>

      <!-- CALENDAR -->
      <div id="page-calendar" class="hidden">
        <div class="cal-toolbar">
          <div class="cal-nav">
            <div class="cal-title" id="calTitle"></div>
            <div style="display:flex;gap:4px;margin-left:12px">
              <button class="cal-nav-btn" onclick="calNav(-1)">‹</button>
              <button class="cal-nav-btn" onclick="calNav(0)">오늘</button>
              <button class="cal-nav-btn" onclick="calNav(1)">›</button>
            </div>
          </div>
          <div class="view-toggle">
            <button class="view-btn cal-vtb active" onclick="setCV('month',this)">월간</button>
            <button class="view-btn cal-vtb" onclick="setCV('week',this)">주간</button>
          </div>
        </div>
        <div id="calBody"></div>
      </div>

      <!-- EMP PAGE -->
      <div id="page-emp" class="hidden">
        <div class="emp-hero">

function rebuildIdx(){let n=1;[...tasks].sort((a,b)=>a.createdAt<b.createdAt?-1:1).forEach(t=>{if(t.shared)t.idx=n++;else t.idx=null;});}
function sortT(arr){return[...arr].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;if(!a.due)return 1;if(!b.due)return -1;return a.due<b.due?-1:1;});}
function dL(due){
  if(!due)return null;
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(due),diff=Math.round((d-now)/86400000);
  if(diff<0)return{text:'D+'+Math.abs(diff),cls:'tag-over'};
  if(diff===0)return{text:'TODAY',cls:'tag-soon'};
  if(diff<=3)return{text:'D-'+diff,cls:'tag-soon'};
  return{text:'D-'+diff,cls:'tag-ok'};
}
function toast(msg,color){
  const f=document.createElement('div');
  f.style.cssText='position:fixed;bottom:24px;right:24px;background:'+(color||'var(--green)')+';color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:modalIn .2s ease;font-family:Pretendard,sans-serif';
  f.textContent=msg;document.body.appendChild(f);setTimeout(()=>f.remove(),2500);
}

// ── BATCH DELETE ──
let batchSelected=new Set();
function batchToggle(id){if(batchSelected.has(id))batchSelected.delete(id);else batchSelected.add(id);updateBatchUI();}
function batchSelectAll(ids){if(batchSelected.size===ids.length){batchSelected.clear();}else{batchSelected=new Set(ids);}updateBatchUI();}
function updateBatchUI(){
  document.querySelectorAll('.batch-cb').forEach(function(cb){cb.checked=batchSelected.has(cb.dataset.tid);});
  document.querySelectorAll('.task-card,.task-list-row,.emp-task').forEach(function(el){
    if(el.dataset.tid)el.classList.toggle('batch-selected',batchSelected.has(el.dataset.tid));
  });
  const info=document.querySelector('.batch-info');if(info)info.textContent=batchSelected.size?batchSelected.size+'개 선택됨':'';
  const selBtn=document.getElementById('batchDelSelBtn');if(selBtn)selBtn.disabled=!batchSelected.size;
}
function batchDeleteSelected(){
  if(!batchSelected.size)return;
  if(!confirm('선택한 '+batchSelected.size+'개를 삭제할까요?'))return;
  tasks=tasks.filter(function(t){return !batchSelected.has(t.id);});
  batchSelected.clear();sv('tm_t',tasks);refreshAll();
}
function batchDeleteAllDone(scope){
  let target;
  if(scope==='board')target=tasks.filter(function(t){return t.shared&&t.done;});
  else target=tasks.filter(function(t){return t.assignee===scope&&t.done;});
  if(!target.length){alert('삭제할 완료 업무가 없습니다.');return;}
  if(!confirm('완료된 업무 '+target.length+'개를 모두 삭제할까요?'))return;
  const ids=new Set(target.map(function(t){return t.id;}));
  tasks=tasks.filter(function(t){return !ids.has(t.id);});
  batchSelected.clear();sv('tm_t',tasks);refreshAll();
}
function renderBatchBar(container,doneIds,scope){
  batchSelected.clear();
  const bar=document.createElement('div');bar.className='batch-bar';
  bar.innerHTML='<button class="btn btn-secondary btn-xs" onclick="batchSelectAll('+JSON.stringify(doneIds)+')">전체선택</button>'+
    '<button class="btn btn-secondary btn-xs" id="batchDelSelBtn" disabled onclick="batchDeleteSelected()">선택 삭제</button>'+
    '<button class="btn btn-secondary btn-xs" style="color:var(--red);border-color:var(--red)" onclick="batchDeleteAllDone(\''+scope+'\')">전체 삭제</button>'+
    '<span class="batch-info"></span>';
  container.appendChild(bar);
}

// ── CALENDAR ──
function calNav(dir){
  if(calView==='month'){if(dir===0)calDate=new Date();else calDate=new Date(calDate.getFullYear(),calDate.getMonth()+dir,1);}
  else{if(dir===0)calDate=new Date();else{calDate=new Date(calDate);calDate.setDate(calDate.getDate()+dir*7);}}
  renderCal();
}
function setCV(v,el){calView=v;document.querySelectorAll('.cal-vtb').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderCal();}
function renderCal(){calView==='month'?renderMonthCal():renderWeekCal();}
function calVis(){return tasks.filter(t=>t.shared);}
function renderMonthCal(){
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('calTitle').textContent=y+'년 '+(m+1)+'월';
  const body=document.getElementById('calBody');body.innerHTML='';
  const wrap=document.createElement('div');wrap.className='cal-wrap';
  const g=document.createElement('div');g.className='cal-grid';
  ['일','월','화','수','목','금','토'].forEach(function(d){const el=document.createElement('div');el.className='cal-day-label';el.textContent=d;g.appendChild(el);});
  const first=new Date(y,m,1),last=new Date(y,m+1,0),today=new Date();today.setHours(0,0,0,0);
  const vis=calVis();
  const mk=function(date,isCur){
    const ds=date.toISOString().split('T')[0];
    const cell=document.createElement('div');cell.className='cal-cell'+(!isCur?' other-month':'');
    if(date.getTime()===today.getTime())cell.classList.add('today');
    const dn=document.createElement('div');dn.className='cal-date';dn.textContent=date.getDate();cell.appendChild(dn);
    vis.filter(t=>t.due===ds).slice(0,4).forEach(function(t){
      const emp=getP(t.assignee),color=emp?emp.color:'#9ca3af';
      const chip=document.createElement('div');chip.className='cal-chip'+(t.done?' done':'');
      chip.style.cssText='background:'+color+'18;color:'+color;
      chip.textContent=(t.idx?'('+t.idx+') ':'')+t.title;chip.title=t.title;
      chip.onclick=function(){openTaskCmt(t.id);};cell.appendChild(chip);
    });
    const extra=vis.filter(t=>t.due===ds).length-4;
    if(extra>0){const m2=document.createElement('div');m2.className='cal-more';m2.textContent='+'+extra+'개';cell.appendChild(m2);}
    g.appendChild(cell);
  };
  for(let i=0;i<first.getDay();i++)mk(new Date(y,m,i-first.getDay()+1),false);
  for(let d=1;d<=last.getDate();d++)mk(new Date(y,m,d),true);
  const rem=(7-(first.getDay()+last.getDate())%7)%7;
  for(let d=1;d<=rem;d++)mk(new Date(y,m+1,d),false);
  wrap.appendChild(g);body.appendChild(wrap);
}
function renderWeekCal(){
  const base=new Date(calDate),dow=base.getDay();
  const ws=new Date(base);ws.setDate(base.getDate()-dow);
  const days=Array.from({length:7},function(_,i){const d=new Date(ws);d.setDate(ws.getDate()+i);return d;});
  const m1=days[0].getMonth()+1,m2=days[6].getMonth()+1,y=days[0].getFullYear();
  const calTitleText=m1===m2?y+'년 '+m1+'월 '+days[0].getDate()+'~'+days[6].getDate()+'일':y+'년 '+m1+'월 '+days[0].getDate()+'~'+m2+'월 '+days[6].getDate()+'일';
  document.getElementById('calTitle').textContent=calTitleText;
  const body=document.getElementById('calBody');body.innerHTML='';
  const today=new Date();today.setHours(0,0,0,0);const vis=calVis();
  const wrap=document.createElement('div');wrap.className='week-wrap';
  const hg=document.createElement('div');hg.className='week-header-grid';
  const dn=['일','월','화','수','목','금','토'];
  days.forEach(function(d){
    const isT=d.getTime()===today.getTime();
    const hd=document.createElement('div');hd.className='week-day-head'+(isT?' is-today':'');
    hd.innerHTML='<div class="week-day-name">'+dn[d.getDay()]+'</div><div class="week-day-num">'+d.getDate()+'</div>';
    hg.appendChild(hd);
  });
  wrap.appendChild(hg);
  const bg=document.createElement('div');bg.className='week-body-grid';
  days.forEach(function(d){
    const ds=d.toISOString().split('T')[0];
    const col=document.createElement('div');col.className='week-cell';
    const dayT=vis.filter(t=>t.due===ds);
    if(!dayT.length)col.innerHTML='<div style="font-size:11px;color:var(--text3);padding:4px 2px">—</div>';
    dayT.forEach(function(t){
      const emp=getP(t.assignee),color=emp?emp.color:'#9ca3af',name=emp?emp.name:'미배정';
      const chip=document.createElement('div');chip.className='week-chip'+(t.done?' done':'');
      chip.style.cssText='background:'+color+'12;color:'+color+';border-color:'+color;
      chip.textContent='* '+name+': '+t.title+(t.idx?' ('+t.idx+')':'');
      chip.onclick=function(){openTaskCmt(t.id);};col.appendChild(chip);
    });
    bg.appendChild(col);
  });
  wrap.appendChild(bg);body.appendChild(wrap);
  // sidebar
  const si=document.createElement('div');si.className='week-sidebar';
  const weekDs=new Set(days.map(d=>d.toISOString().split('T')[0]));
  const wt=vis.filter(t=>t.due&&weekDs.has(t.due));
  si.innerHTML='<div class="week-sidebar-title">📋 이번 주 직원별 업무</div>';
  const grps=[{emp:{id:'_u',name:'미배정',color:'#9ca3af'},tasks:wt.filter(t=>!t.assignee)},...ALL.map(e=>({emp:e,tasks:wt.filter(t=>t.assignee===e.id)}))].filter(g=>g.tasks.length);
  if(!grps.length)si.innerHTML+='<div class="empty-state" style="padding:12px">이번 주 마감 업무가 없습니다</div>';
  grps.forEach(function(g){
    const bl=document.createElement('div');bl.className='week-emp-block';
    bl.innerHTML='<div class="week-emp-name"><div class="emp-dot" style="background:'+g.emp.color+'"></div>'+g.emp.name+'</div>';
    g.tasks.forEach(function(t){
      const dl=dL(t.due);const idxPart=t.idx?'('+t.idx+') ':'';const duePart=t.due?' — '+t.due.slice(5).replace('-','/')+(dl?' ('+dl.text+')':''):'';
      const item=document.createElement('div');item.className='week-task-item';item.style.borderColor=g.emp.color;item.textContent=idxPart+t.title+duePart;bl.appendChild(item);
    });
    si.appendChild(bl);
  });
  body.appendChild(si);
}

function buildReportDashboard(projId) {
  // CU가 아직 설정 안됐으면 전역에서 재취득
  if(!CU) { console.warn('buildReportDashboard: CU is null'); }
  const proj = projects.find(p => p.id === projId);
  if(!proj) return '';
  const reports = ld('tm_reports', {});
  const projReports = reports[projId] || [];
  const members = (proj.members && proj.members.length > 0) ? proj.members : ALL.map(u => u.id);

  const statusLabel = {done:'완료',progress:'진행중',issue:'이슈',plan:'계획'};
  const statusBadge = {done:'badge-done',progress:'badge-progress',issue:'badge-issue',plan:'badge-plan'};
  const statusEmoji = {done:'✅',progress:'🔄',issue:'⚠️',plan:'📋'};
  const statusColor = {done:'#16a34a',progress:'#1a6fc4',issue:'#dc2626',plan:'#6b7280'};
  const statusBg   = {done:'#dcfce7',progress:'#dbeafe',issue:'#fee2e2',plan:'#f3f4f6'};

  let html = '<div class="report-dashboard">';
  html += '<div class="report-dashboard-title">📊 담당자별 보고 현황</div>';

  members.forEach(memberId => {
    const user = ALL.find(u => u.id === memberId);
    if(!user) return;
    const mReports = projReports.filter(r => r.author === memberId).sort((a,b) => b.ts - a.ts);
    const cuId = (typeof CU !== 'undefined' && CU) ? CU.id : null;
    const isMe = cuId === memberId;

    html += '<div class="report-member-col">';
    html += '<div class="report-member-header">';
    html += '<div class="report-member-avatar" style="background:' + user.color + '">' + user.name[0] + '</div>';
    html += '<div class="report-member-name">' + esc(user.name) + '</div>';
    html += '<div class="report-member-count">보고 ' + mReports.length + '건</div>';
    html += '</div>';

    if(isMe) {
      html += '<div class="report-kanban">';
      mReports.forEach(r => {
        const st = r.status || 'progress';
        const date = new Date(r.ts);
        const dateStr = (date.getMonth()+1) + '/' + date.getDate() + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
        html += '<div class="rk-card">';
        html += '<div class="rk-card-top">';
        html += '<div class="rk-card-icon" style="background:' + statusBg[st] + ';color:' + statusColor[st] + '">' + statusEmoji[st] + '</div>';
        html += '<div class="rk-card-title">' + esc(r.title||'보고') + '</div>';
        html += '<span class="rk-card-badge" style="background:' + statusBg[st] + ';color:' + statusColor[st] + '">' + statusLabel[st] + '</span>';
        html += '</div>';
        if(r.body) html += '<div class="rk-card-body">' + esc(r.body) + '</div>';
        html += '<div class="rk-card-footer">';
        html += '<span>🕐 ' + dateStr + '</span>';
        html += '<button class="rk-del-btn" onclick="delReport(\'' + projId + '\',' + r.id + ')">🗑</button>';
        html += '</div></div>';
      });

      html += '<div class="rk-new-card">';
      html += '<div class="rk-new-card-header">';
      html += '<div class="rk-status-tabs" id="rStatusTabs_' + memberId + '">';
      ['progress','done','plan','issue'].forEach((st,i) => {
        const cls = i===0 ? 'rk-status-tab active' : 'rk-status-tab';
        const sty = i===0 ? 'background:' + statusBg[st] + ';color:' + statusColor[st] + ';border-color:' + statusColor[st] : '';
        html += '<button class="' + cls + '" data-status="' + st + '" onclick="pickReportStatus(this,\'' + memberId + '\')" style="' + sty + '">' + statusEmoji[st] + ' ' + statusLabel[st] + '</button>';
      });
      html += '</div></div>';
      html += '<input id="rTitle_' + memberId + '" class="rk-title-input" type="text" placeholder="보고 제목  (예: 인스타 광고 소재 3개 완성)">';
      html += '<textarea id="rBody_' + memberId + '" class="rk-body-input" placeholder="상세 내용을 입력하세요...\n\n진행상황, 완료사항, 이슈 등을 자유롭게 작성하세요"></textarea>';
      html += '<div class="rk-new-card-footer">';
      html += '<span class="rk-hint">Ctrl+Enter로 등록</span>';
      html += '<button class="rk-submit-btn" onclick="submitReport(\'' + projId + '\',\'' + memberId + '\')">보고 등록</button>';
      html += '</div>';
      html += '<input type="hidden" id="rStatus_' + memberId + '" value="progress">';
      html += '</div>';
      html += '</div>';
    } else {
      if(mReports.length > 0) {
        html += '<div class="report-cards">';
        mReports.forEach(r => {
          const st = r.status || 'progress';
          const date = new Date(r.ts);
          const dateStr = (date.getMonth()+1) + '/' + date.getDate() + ' ' + String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
          html += '<div class="rk-card">';
          html += '<div class="rk-card-top">';
          html += '<div class="rk-card-icon" style="background:' + statusBg[st] + ';color:' + statusColor[st] + '">' + statusEmoji[st] + '</div>';
          html += '<div class="rk-card-title">' + esc(r.title||'보고') + '</div>';
          html += '<span class="rk-card-badge" style="background:' + statusBg[st] + ';color:' + statusColor[st] + '">' + statusLabel[st] + '</span>';
          html += '</div>';
          if(r.body) html += '<div class="rk-card-body">' + esc(r.body) + '</div>';
          html += '<div class="rk-card-footer"><span>🕐 ' + dateStr + '</span></div>';
          html += '</div>';
        });
        html += '</div>';
      } else {
        html += '<div class="report-empty">아직 보고 내용이 없습니다</div>';
      }
    }
    html += '</div>';
  });

  html += '</div>';
  return html;
}

// ── WEEKLY REPORT ──
function renderWeekReport(){
  const wrap=document.getElementById('weekReport');wrap.innerHTML='';
  const now=new Date(),dow=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  const weekTasks=tasks.filter(function(t){if(!t.shared)return false;if(!t.due)return false;var d=new Date(t.due);return d>=mon&&d<=sun;});
  const done=weekTasks.filter(function(t){return t.done;}).length;
  const active=weekTasks.filter(function(t){return !t.done;}).length;
  const overdue=weekTasks.filter(function(t){return !t.done&&t.due&&new Date(t.due)<now;}).length;
  const total=weekTasks.length,pct=total?Math.round(done/total*100):0;
  var html='<div class="week-report"><div class="wr-title">📊 이번 주 리포트</div>';
  html+='<div class="wr-stats"><div class="wr-stat"><div class="wr-stat-n" style="color:var(--green)">'+done+'</div><div class="wr-stat-l">완료</div></div>';
  html+='<div class="wr-stat"><div class="wr-stat-n" style="color:var(--primary)">'+active+'</div><div class="wr-stat-l">진행중</div></div>';
  html+='<div class="wr-stat"><div class="wr-stat-n" style="color:var(--red)">'+overdue+'</div><div class="wr-stat-l">기한초과</div></div></div>';
  html+='<div class="wr-bar"><div class="wr-bar-fill" style="width:'+pct+'%"></div></div>';
  html+='<div class="wr-msg">'+(done>0?'이번 주 '+done+'개 완료 🎉':'이번 주 완료된 업무가 없습니다')+'</div></div>';
  wrap.innerHTML=html;
}

// ── POMODORO TIMER ──
var pomoInterval=null,pomoEnd=0,pomoTaskName='';
function startPomo(taskId){
  var t=tasks.find(function(x){return x.id===taskId;});if(!t)return;
  if(pomoInterval){clearInterval(pomoInterval);}
  pomoTaskName=t.title;pomoEnd=Date.now()+25*60*1000;
  var bar=document.getElementById('pomoBar');
  bar.style.display='flex';bar.className='pomo-bar';
  updatePomo();
  pomoInterval=setInterval(updatePomo,1000);
}
function updatePomo(){
  var remain=Math.max(0,pomoEnd-Date.now());
  var mins=Math.floor(remain/60000),secs=Math.floor((remain%60000)/1000);
  var bar=document.getElementById('pomoBar');
  bar.innerHTML='<span>🍅</span><span class="pomo-time">'+(mins<10?'0':'')+mins+':'+(secs<10?'0':'')+secs+'</span><span class="pomo-task">'+pomoTaskName+'</span><button class="pomo-cancel" onclick="cancelPomo()">취소</button>';
  if(remain<=0){clearInterval(pomoInterval);pomoInterval=null;bar.style.display='none';toast('🍅 포모도로 완료! 잠시 쉬어가세요','var(--red)');}
}
function cancelPomo(){if(pomoInterval)clearInterval(pomoInterval);pomoInterval=null;document.getElementById('pomoBar').style.display='none';}

function renderSettingsTab3(){
  var panel=document.getElementById('sp3');

  var html='<div style="font-size:13px;font-weight:700;margin-bottom:12px">🔔 알림 설정</div>';
  html+='<div class="setting-row"><div><div style="font-size:13px;font-weight:600">브라우저 알림</div><div style="font-size:11px;color:var(--text3)">마감 D-1, D-0 업무 알림</div></div>'+
    '<label class="toggle-sw"><input type="checkbox" '+(enabled?'checked':'')+' onchange="toggleNotif(this.checked)" /><div class="toggle-track"></div><div class="toggle-knob"></div></label></div>';
  html+='<div style="margin-top:12px;font-size:11.5px;color:var(--text3)">알림을 켜면 브라우저 권한을 요청합니다.<br>마감이 D-1 또는 D-0인 업무가 있을 때 알림이 표시됩니다.</div>';
  panel.innerHTML=html;

function toggleNotif(on){
  var notifKey='tm_notif_'+CU.id;
  if(on){
    if('Notification' in window){
      Notification.requestPermission().then(function(perm){
        if(perm==='granted'){localStorage.setItem(notifKey,'true');toast('✓ 알림이 켜졌습니다!');}
        else{localStorage.setItem(notifKey,'false');renderSettingsTab3();toast('알림 권한이 거부됐습니다','var(--red)');}
      });
    }else{toast('이 브라우저는 알림을 지원하지 않습니다','var(--red)');}
  }else{localStorage.setItem(notifKey,'false');toast('알림이 꺼졌습니다');}
}
function checkDueNotif(){
  if(!CU)return;var notifKey='tm_notif_'+CU.id;if(localStorage.getItem(notifKey)!=='true')return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  var today=todayStr(),now=new Date();now.setHours(0,0,0,0);
  var tomorrow=new Date(now);tomorrow.setDate(tomorrow.getDate()+1);var tmrStr=tomorrow.toISOString().split('T')[0];
  var urgent=tasks.filter(function(t){return !t.done&&t.assignee===CU.id&&(t.due===today||t.due===tmrStr);});
  if(urgent.length){new Notification('⏰ Dream Academy - 마감 임박',{body:urgent.length+'개 업무가 곧 마감됩니다: '+urgent.map(function(t){return t.title;}).slice(0,3).join(', '),icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">⏰</text></svg>'});}
}

        '<button class="btn btn-primary btn-xs" onclick="sAdminResetPw(\''+u.id+'\',\''+u.name+'\')">변경</button>';

function savePwSettings(){
  var cur=document.getElementById('sPwCur').value,np=document.getElementById('sPwNew').value,cf=document.getElementById('sPwCfm').value;
  var err=document.getElementById('sPwErr');err.style.display='none';
  if(cur!==PASSWORDS[CU.id]){err.textContent='❌ 현재 비밀번호가 틀렸습니다';err.style.display='block';return;}
  if(np.length<4){err.textContent='❌ 새 비밀번호는 4자 이상이어야 합니다';err.style.display='block';return;}
  if(np!==cf){err.textContent='❌ 새 비밀번호가 일치하지 않습니다';err.style.display='block';return;}
  PASSWORDS[CU.id]=np;sv('tm_pw',PASSWORDS);toast('✓ 비밀번호가 변경됐어요!');
  ['sPwCur','sPwNew','sPwCfm'].forEach(function(id){document.getElementById(id).value='';});
}
function sAdminResetPw(userId,userName){
  var inp=document.getElementById('sapw-'+userId);var newPw=inp.value.trim();
  if(!newPw||newPw.length<4){inp.focus();inp.style.borderColor='var(--red)';return;}
  PASSWORDS[userId]=newPw;sv('tm_pw',PASSWORDS);inp.value='';inp.style.borderColor='var(--green)';
  toast('✓ '+userName+'의 비밀번호가 변경됐어요!');
  setTimeout(function(){inp.style.borderColor='var(--border2)';},2000);
}

window.addEventListener('DOMContentLoaded', function(){
  var params=new URLSearchParams(window.location.search);
  var autoUser=params.get('user');
  if(autoUser){
    var u=ALL.find(function(e){return e.id===autoUser;});
    if(u){doLogin(u);return;}
  }
  try{
    var saved=JSON.parse(localStorage.getItem('tm_session'));
    if(saved&&saved.id){
      var su=ALL.find(function(e){return e.id===saved.id;});
      if(su){doLogin(su);return;}
    }
  }catch(e){localStorage.removeItem('tm_session');}
  buildLogin();
});
